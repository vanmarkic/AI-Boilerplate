name: register
tier: 1
description: User registration form — demonstrates Angular reactive forms pattern
version: 0.1.0
dependencies:
  internal: [user]
  external: []
api_endpoints:
  - POST /api/users
models: [RegisterFormValue]
events_emitted: []
events_consumed: []
business_rules:
  - "Email field: required, email format validation, inline error on invalid"
  - "Name field: required, 1-100 chars, inline error on invalid"
  - "On 409 (duplicate email): show error, keep form populated"
  - "On 201 (success): navigate to dashboard or confirmation"
