# Aider — GLM-4.7-Flash profile (RunPod RTX A4500, standalone llama-server)
# Usage: aider --config .aider-glm.conf.yml [files...]

model: openai/glm-4.7-flash
openai-api-base: https://02p2i0ozb526qw-8080.proxy.runpod.net/v1
openai-api-key: not-needed
# GLM-4.7-Flash optimal inference params (from Unsloth docs)
extra-params: temperature=0.7,top_p=1.0,repeat_penalty=1.0

# Commits
auto-commits: false
dirty-commits: false
attribute-author: true
attribute-committer: false

# Output
pretty: true
stream: true
show-diffs: true

# Behaviour
suggest-shell-commands: false
watch-files: false

# Read-only context (always loaded, never edited)
read:
  - AGENTS.md
  - backend/AGENTS.md
  - frontend/AGENTS.md
