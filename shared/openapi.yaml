openapi: 3.1.0
info:
  title: AI Boilerplate API
  version: 0.1.0
  description: >
    REST API for the AI Boilerplate reference application — user registration,
    profile management, and system health monitoring. See SPECS.md for full
    product specification and business rules.

servers:
  - url: http://localhost:8000
    description: Local development

paths:
  /api/health:
    get:
      operationId: healthCheck
      summary: Health check endpoint
      description: >
        Readiness/liveness probe for container orchestration (Docker, Kubernetes).
        Returns service status and version. No authentication required.
        Must respond in < 100ms.
      tags: [health]
      responses:
        '200':
          description: Service is healthy and ready to accept requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/users:
    post:
      operationId: createUser
      summary: Register a new user
      description: >
        Creates a new user account. Email must be unique across all users.
        The created_at timestamp is set server-side (UTC). Returns the full
        user record on success, or 409 if the email is already registered.
      tags: [users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '409':
          description: A user with this email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/users/{id}:
    get:
      operationId: getUser
      summary: Get user by ID
      description: >
        Retrieves a single user by their numeric ID. Returns 404 if no user
        exists with the given ID.
      tags: [users]
      parameters:
        - name: id
          in: path
          required: true
          description: Numeric user ID (auto-incrementing integer)
          schema:
            type: integer
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '404':
          description: No user exists with this ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    HealthResponse:
      type: object
      description: System health status returned by the readiness probe
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]
          description: Always "ok" when the service is healthy
        version:
          type: string
          description: Application version (semver from pyproject.toml)

    CreateUserRequest:
      type: object
      description: Payload for registering a new user account
      required: [email, name]
      properties:
        email:
          type: string
          format: email
          description: User's primary email address, used as unique login identifier
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: User's display name shown in the UI (1-100 characters)

    UserResponse:
      type: object
      description: Full user record returned after registration or retrieval
      required: [id, email, name, created_at]
      properties:
        id:
          type: integer
          description: Auto-incrementing numeric user ID
        email:
          type: string
          description: User's unique email address
        name:
          type: string
          description: User's display name
        created_at:
          type: string
          format: date-time
          description: UTC timestamp of when the user registered

    ErrorResponse:
      type: object
      description: Standard error envelope for all 4xx/5xx responses
      required: [detail]
      properties:
        detail:
          type: string
          description: Human-readable error message describing what went wrong

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        JWT bearer token authentication (currently a stub — tokens are not
        validated). Swap for real JWT/OAuth validation in production.
